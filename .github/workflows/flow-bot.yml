name: 4DMIXX Flow AI 회의봇

on:
  # Flow 웹훅 → GitHub repository_dispatch
  repository_dispatch:
    types: [flow-new-post]

  # 수동 테스트용
  workflow_dispatch:
    inputs:
      post_content:
        description: '게시글 내용 (안건들, 줄바꿈으로 구분)'
        required: true
      post_title:
        description: '게시글 제목'
        default: '수동 테스트 회의'
      receiver_id:
        description: '알림 수신자 ID (createBotPost 실패 시 폴백)'
        default: '4dmixx@4dmixx.com'

jobs:
  ai-meeting:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node 의존성 설치
        run: |
          cd scripts
          npm install node-fetch

      - name: Flow AI 회의 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLOW_API_TOKEN:    ${{ secrets.FLOW_API_TOKEN }}
          FLOW_PROJECT_ID:   ${{ secrets.FLOW_PROJECT_ID }}
          # repository_dispatch: client_payload / workflow_dispatch: inputs
          FLOW_POST_CONTENT: ${{ github.event.client_payload.content || inputs.post_content }}
          FLOW_POST_TITLE:   ${{ github.event.client_payload.title   || inputs.post_title }}
          FLOW_RECEIVER_ID:  ${{ github.event.client_payload.userId  || inputs.receiver_id || '4dmixx@4dmixx.com' }}
        run: node scripts/flow-meeting.mjs
