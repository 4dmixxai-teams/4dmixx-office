name: 4DMIXX Flow 자동 회의봇

on:
  # Flow 웹훅 → GitHub repository_dispatch 로 트리거
  # Flow 웹훅 설정: POST https://api.github.com/repos/4dmixxai-teams/4dmixx-office/dispatches
  # Body: { "event_type": "flow-post", "client_payload": { "post": { ...Flow post data... } } }
  repository_dispatch:
    types: [flow-post]

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      post_payload:
        description: '게시글 JSON ({"postId":"...","title":"...","content":"..."})'
        required: false
        default: ''

jobs:
  flow-meeting-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 의존성 (PDF)
        run: pip install reportlab

      - name: 한글 폰트
        run: sudo apt-get install -y fonts-nanum 2>/dev/null || true

      - name: Node 의존성
        run: npm install node-fetch@3

      - name: Flow 봇 실행 (웹훅)
        if: github.event_name == 'repository_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLOW_MCP_TOKEN: ${{ secrets.FLOW_MCP_TOKEN }}
          FLOW_PROJECT_ID: ${{ secrets.FLOW_PROJECT_ID }}
          WEBHOOK_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node flow-meeting.mjs

      - name: Flow 봇 실행 (수동 테스트)
        if: github.event_name == 'workflow_dispatch' && inputs.post_payload != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLOW_MCP_TOKEN: ${{ secrets.FLOW_MCP_TOKEN }}
          FLOW_PROJECT_ID: ${{ secrets.FLOW_PROJECT_ID }}
          WEBHOOK_PAYLOAD: ${{ inputs.post_payload }}
        run: node flow-meeting.mjs

      - name: 처리 이력 커밋
        run: |
          git config user.name "4DMIXX AI Bot"
          git config user.email "bot@4dmixx.com"
          git add scripts/.processed_posts.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 처리이력 $(date '+%Y-%m-%d %H:%M')" && git push || true
