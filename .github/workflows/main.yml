name: 4DMIXX 자동화 통합

# ─── 스케줄 트리거 (cron-job.org 또는 GitHub 백업) ───────────────────────────
# 평일 10:05 / 13:05 / 17:05 KST → 봇 디스패치
# 매일 09:00 KST                  → AI 전략 회의
#
# 필요 Secret: DISPATCH_PAT (workflow scope PAT)

on:
  schedule:
    - cron: '5 1 * * 1-5'   # 평일 10:05 KST — 봇 디스패치
    - cron: '5 4 * * 1-5'   # 평일 13:05 KST — 봇 디스패치
    - cron: '5 8 * * 1-5'   # 평일 17:05 KST — 봇 디스패치

  workflow_dispatch:
    inputs:
      target:
        description: '봇 디스패치 대상'
        required: false
        default: 'all'
        type: choice
        options: [all, mixbot, 3dprint, recode, meeting]
      post_payload:
        description: '게시글 JSON (웹훅 테스트용)'
        required: false
        default: ''

  repository_dispatch:
    types: [flow-new-post, meeting-complete]


jobs:
  # ── 봇 디스패치 (평일 스케줄 or 수동) ───────────────────────────────────────
  dispatch-bots:
    if: >
      github.event.schedule == '5 1 * * 1-5' ||
      github.event.schedule == '5 4 * * 1-5' ||
      github.event.schedule == '5 8 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.target != 'meeting' && inputs.post_payload == '')
    runs-on: ubuntu-latest

    steps:
      - name: 현재 KST 시각
        run: TZ=Asia/Seoul date

      - name: flow-mixbot 트리거
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'mixbot' }}
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/4dmixxai-teams/flow-mixbot/actions/workflows/sync_and_notify.yml/dispatches \
            -d '{"ref":"main","inputs":{"force_run":"false"}}')
          echo "flow-mixbot → HTTP $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ 성공" || echo "❌ 실패"

      - name: flow-3dprint-bot 트리거
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == '3dprint' }}
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/4dmixxai-teams/flow-3dprint-bot/actions/workflows/report.yml/dispatches \
            -d '{"ref":"main"}')
          echo "flow-3dprint-bot → HTTP $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ 성공" || echo "❌ 실패"

      - name: recode-note 트리거
        if: ${{ inputs.target == 'all' || inputs.target == 'recode' }}
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/4dmixxai-teams/recode-note/actions/workflows/transcribe.yml/dispatches \
            -d '{"ref":"main"}')
          echo "recode-note → HTTP $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ 성공" || echo "❌ 실패"

  # ── AI 전략 회의 (매일 09:00 KST or 수동) ───────────────────────────────────

  # ── Flow 웹훅 → 회의봇 (repository_dispatch: flow-new-post or 수동 테스트) ──
  flow-meeting-bot:
    if: >
      github.event.action == 'flow-new-post' ||
      (github.event_name == 'workflow_dispatch' && inputs.post_payload != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install reportlab
      - run: sudo apt-get install -y fonts-nanum 2>/dev/null || true
      - run: npm install node-fetch@3

      - name: Flow 봇 실행 (웹훅)
        if: github.event_name == 'repository_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLOW_MCP_TOKEN:    ${{ secrets.FLOW_MCP_TOKEN }}
          FLOW_PROJECT_ID:   ${{ secrets.FLOW_PROJECT_ID }}
          WEBHOOK_PAYLOAD:   ${{ toJson(github.event.client_payload) }}
        run: node flow-meeting.mjs

      - name: Flow 봇 실행 (수동 테스트)
        if: github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLOW_MCP_TOKEN:    ${{ secrets.FLOW_MCP_TOKEN }}
          FLOW_PROJECT_ID:   ${{ secrets.FLOW_PROJECT_ID }}
          WEBHOOK_PAYLOAD:   ${{ inputs.post_payload }}
        run: node flow-meeting.mjs

      - name: 처리 이력 커밋
        run: |
          git config user.name "4DMIXX AI Bot"
          git config user.email "bot@4dmixx.com"
          git add scripts/.processed_posts.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 처리이력 $(date '+%Y-%m-%d %H:%M')" && git push || true

  # ── PDF 생성 (repository_dispatch: meeting-complete) ────────────────────────
  generate-pdf:
    if: github.event.action == 'meeting-complete'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 한글 폰트 및 weasyprint 설치
        run: |
          sudo apt-get install -y fonts-nanum python3-pip
          pip install weasyprint

      - name: PDF 생성
        env:
          MEETING_TITLE:   ${{ github.event.client_payload.title }}
          MEETING_CONTENT: ${{ github.event.client_payload.content }}
          PDF_FILENAME:    ${{ github.event.client_payload.filename }}
        run: |
          python3 << 'PYEOF'
          import os, re
          from weasyprint import HTML

          title    = os.environ.get("MEETING_TITLE", "AI 회의 결과")
          content  = os.environ.get("MEETING_CONTENT", "")
          filename = os.environ.get("PDF_FILENAME", "meeting.pdf")

          def md_to_html(text):
              text = re.sub(r'^## (.+)$', r'<h2>\1</h2>', text, flags=re.MULTILINE)
              text = re.sub(r'^# (.+)$',  r'<h1>\1</h1>', text, flags=re.MULTILINE)
              text = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', text)
              text = re.sub(r'^- (.+)$', r'<li>\1</li>', text, flags=re.MULTILINE)
              return text.replace('\n', '<br>')

          html = f"""<!DOCTYPE html><html><head><meta charset="utf-8">
          <style>
            @font-face {{ font-family:'NanumGothic'; src:url('/usr/share/fonts/truetype/nanum/NanumGothic.ttf'); }}
            body {{ font-family:'NanumGothic',sans-serif; margin:40px; line-height:1.8; }}
            h1 {{ font-size:20px; border-bottom:2px solid #333; padding-bottom:8px; }}
            h2 {{ font-size:16px; color:#444; margin-top:20px; }}
          </style></head><body>
          <h1>{title}</h1>{md_to_html(content)}</body></html>"""

          os.makedirs("pdfs", exist_ok=True)
          HTML(string=html).write_pdf(f"pdfs/{filename}")
          print(f"PDF 생성 완료: pdfs/{filename}")
          PYEOF

      - name: PDF 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/
          git commit -m "Add meeting PDF: ${{ github.event.client_payload.filename }}"
          git push
