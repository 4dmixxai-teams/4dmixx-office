name: 봇 스케줄 디스패처 & 일일 AI 회의

# 외부 크론 서비스(cron-job.org) POST 트리거:
#   POST https://api.github.com/repos/4dmixxai-teams/4dmixx-office/actions/workflows/dispatcher.yml/dispatches
#   Header: Authorization: Bearer {GITHUB_PAT}   (workflow scope)
#   Body:   {"ref":"main"}
#
# 권장 호출 시각 (KST):
#   평일 10:05, 13:05, 17:05 — flow-mixbot / flow-3dprint-bot
#   매일 09:00               — AI 전략 회의 (일일 미팅)
#   매일 */30분              — recode-note (별도 크론 등록 권장)
#
# 필요 Secret: DISPATCH_PAT (Settings → Secrets → Actions)

on:
  workflow_dispatch:
    inputs:
      target:
        description: '트리거 대상'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - mixbot
          - 3dprint
          - recode
          - meeting
  schedule:
    - cron: '5 1 * * 1-5'   # 평일 10:05 KST
    - cron: '5 4 * * 1-5'   # 평일 13:05 KST
    - cron: '5 8 * * 1-5'   # 평일 17:05 KST
    - cron: '0 0 * * *'     # 매일 09:00 KST — AI 전략 회의

jobs:
  dispatch-bots:
    if: >
      github.event.schedule == '5 1 * * 1-5' ||
      github.event.schedule == '5 4 * * 1-5' ||
      github.event.schedule == '5 8 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.target != 'meeting')
    runs-on: ubuntu-latest

    steps:
      - name: 현재 KST 시각
        run: TZ=Asia/Seoul date

      - name: flow-mixbot 트리거
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'mixbot' }}
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/4dmixxai-teams/flow-mixbot/actions/workflows/sync_and_notify.yml/dispatches \
            -d '{"ref":"main","inputs":{"force_run":"false"}}')
          echo "flow-mixbot → HTTP $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ 트리거 성공" || echo "❌ 트리거 실패 (DISPATCH_PAT 확인 필요)"

      - name: flow-3dprint-bot 트리거
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == '3dprint' }}
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/4dmixxai-teams/flow-3dprint-bot/actions/workflows/report.yml/dispatches \
            -d '{"ref":"main"}')
          echo "flow-3dprint-bot → HTTP $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ 트리거 성공" || echo "❌ 트리거 실패 (DISPATCH_PAT 확인 필요)"

      - name: recode-note 트리거
        if: ${{ inputs.target == 'all' || inputs.target == 'recode' }}
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/4dmixxai-teams/recode-note/actions/workflows/transcribe.yml/dispatches \
            -d '{"ref":"main"}')
          echo "recode-note → HTTP $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ 트리거 성공" || echo "❌ 트리거 실패 (DISPATCH_PAT 확인 필요)"

  daily-meeting:
    if: >
      github.event.schedule == '0 0 * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'meeting'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install node-fetch@3

      - name: AI 전략 회의 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/run-meeting.js

      - name: 결과 파일 커밋 & 푸시
        run: |
          git config user.name "4DMIXX AI Bot"
          git config user.email "bot@4dmixx.com"
          git add results/
          git diff --staged --quiet || git commit -m "🤖 AI 전략 회의 결과 자동 업데이트 $(date '+%Y-%m-%d')"
          git push
