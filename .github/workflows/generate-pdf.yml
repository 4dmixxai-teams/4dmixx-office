name: 회의 결과 PDF 생성

on:
  repository_dispatch:
    types: [meeting-complete]

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: fpdf2 설치
        run: pip install fpdf2

      - name: PDF 생성
        env:
          MEETING_TITLE: ${{ github.event.client_payload.title }}
          MEETING_CONTENT: ${{ github.event.client_payload.content }}
        run: |
          python3 - << '"PYEOF"'
          import os
          from fpdf import FPDF

          title = os.environ.get("MEETING_TITLE", "AI 회의 결과")
          content = os.environ.get("MEETING_CONTENT", "")

          pdf = FPDF()
          pdf.add_page()
          pdf.set_auto_page_break(auto=True, margin=15)

          # 유니코드 폰트 (fpdf2 내장)
          pdf.add_font("DejaVu", "", "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf")
          pdf.set_font("DejaVu", size=16)
          pdf.multi_cell(0, 10, title)
          pdf.ln(5)
          pdf.set_font("DejaVu", size=10)
          pdf.multi_cell(0, 7, content)

          import datetime
          filename = f"meeting-{datetime.datetime.now().strftime(\'%Y%m%d-%H%M%S\')}.pdf"
          pdf.output(filename)
          print(f"PDF 생성 완료: {filename}")
          PYEOF

      - name: PDF 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.title }}
          path: "*.pdf"
          retention-days: 90
