name: 4DMIXX 일일 AI 전략 회의

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-meeting:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install node-fetch@3

      - name: AI 전략 회의 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/run-meeting.js

      - name: 결과 파일 커밋 & 푸시
        run: |
          git config user.name  "4DMIXX AI Bot"
          git config user.email "bot@4dmixx.com"
          git add results/
          git diff --staged --quiet || git commit -m "🤖 AI 전략 회의 결과 자동 업데이트 $(date '+%Y-%m-%d')"
          git push
